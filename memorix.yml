# Memorix Configuration for OpenAlpha-Brain
# Generated by grill-build-loop setup

project:
  name: OpenAlpha-Brain
  id: Taiwan-LZX/OpenAlpha-Brain

llm:
  provider: none
  api_key: ${MEMORIX_LLM_API_KEY}

embedding:
  provider: off

git:
  autoHook: false
  noise:
    skipMerge: true

search:
  engine: bm25

retention:
  defaultTTL: 720h
  archiveAfter: 2160h

sync:
  autoSync: false
  ruleSources:
    - .cursorrules
    - CLAUDE.md
    - .windsurfrules
